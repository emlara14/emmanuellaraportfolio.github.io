<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Emmanuel Lara's Portfolio | Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold:    #c9a84c;
      --gold-lt: #e8c96d;
      --card-bg: rgba(8, 8, 12, 0.88);
      --border:  rgba(201, 168, 76, 0.25);
      --text:    #e8e4d9;
      --muted:   #9c9585;
      --radius:  14px;
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      font-size: 19px;
      line-height: 1.8;
      color: var(--text);
      background: #07070c;
    }

    body.melbourne-bg {
      background-image: linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.25)),
                        url("Images/melbourne.jpg");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    /* HEADER */
    header {
      background: linear-gradient(135deg, rgba(0,0,0,0.95) 0%, rgba(15,10,3,0.93) 100%);
      border-bottom: 1px solid var(--border);
      padding: 1.4rem 3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #fff;
    }

    header h1 .accent { color: var(--gold); }

    nav ul { list-style: none; display: flex; gap: 2.5rem; }

    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    nav a:hover, nav a[aria-current="page"] { color: var(--gold); }

    /* LAYOUT */
    main.horizontal {
      display: grid;
      grid-template-columns: 1fr 1fr 520px;
      gap: 2rem;
      align-items: start;
      width: 100%;
      max-width: 1760px;
      margin: 0 auto;
      padding: 2.5rem;
      min-height: calc(100vh - 72px);
    }

    /* CARDS */
    aside {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem 1.8rem;
      backdrop-filter: blur(12px);
      color: var(--text);
    }

    aside h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.55rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.03em;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.75rem;
      margin-bottom: 1.6rem;
    }

    /* INDIVIDUAL JOB CARDS — no top margin needed, standalone cards now */
    .job-entry { margin-top: 0; }

    .job-entry h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.35;
      margin-bottom: 0.2rem;
    }

    .subtitle {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      font-weight: 400;
      color: var(--gold-lt);
    }

    .job-date {
      font-size: 0.84rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 0.8rem;
    }

    .job-entry ul { list-style: none; padding: 0; }

    .job-entry ul li {
      font-size: 0.97rem;
      line-height: 1.75;
      color: #c8c4bb;
      padding-left: 1.1rem;
      position: relative;
      margin-bottom: 0.6rem;
    }

    .job-entry ul li::before {
      content: '\25B8';
      color: var(--gold);
      position: absolute;
      left: 0;
      font-size: 0.78rem;
      top: 0.18em;
    }

    /* LOGO WRAPPERS */
    .logo-wrap {
      background: #fff;
      border-radius: 8px;
      padding: 8px 12px;
      display: inline-block;
      margin-bottom: 1rem;
    }

    .logo-wrap img {
      width: 100px;
      height: auto;
      display: block;
      border-radius: 0;
    }

    /* BIO CENTER — spans full middle column */
    .bio-center {
      grid-column: span 1;
    }

    .bio-name {
      font-family: 'Playfair Display', serif;
      font-size: 2.1rem;
      font-weight: 900;
      color: #fff;
      margin-bottom: 0.15rem;
      border-bottom: none !important;
      padding-bottom: 0 !important;
    }

    .bio-title {
      font-family: 'DM Sans', sans-serif;
      font-size: 1.05rem;
      color: var(--gold-lt);
      text-decoration: underline;
      text-underline-offset: 3px;
      margin-bottom: 1rem;
      display: block;
    }

    .bio-intro {
      font-size: 1.05rem;
      color: #c0bbb0;
      line-height: 1.85;
      margin-bottom: 1.8rem;
    }

    .edu-header {
      font-family: 'Playfair Display', serif;
      font-size: 1.45rem;
      color: var(--gold);
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.6rem;
      margin-bottom: 1.2rem;
    }

    .edu-entry { margin-bottom: 1.2rem; }

    .edu-entry h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.08rem;
      font-weight: 700;
      color: #fff;
    }

    .edu-entry p {
      font-size: 0.92rem;
      color: var(--muted);
    }

    .ucf-img-wrap {
      margin: 1.5rem 0;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .ucf-img-wrap img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 0;
      display: block;
    }

    .linkedin-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 1.2rem;
      background: rgba(201,168,76,0.08);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.9rem 1.2rem;
    }

    .linkedin-row h3 {
      font-size: 1rem;
      font-weight: 500;
      color: var(--text);
      flex: 1;
    }

    .linkedin-logo {
      width: 44px !important;
      height: 44px !important;
      border-radius: 8px;
      object-fit: cover;
    }

    /* HEADSHOT */
    article {
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .image-box {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem;
      display: inline-block;
      backdrop-filter: blur(12px);
    }

    .image-box img {
      width: 560px;
      max-width: 100%;
      height: auto;
      border-radius: 10px;
      display: block;
    }

    img { max-width: 100%; height: auto; }
  </style>
</head>
